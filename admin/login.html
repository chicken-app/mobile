<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        overflow: hidden;
      }

      /* Animated Background */
      .bg-gradient-animate {
        background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #0f172a);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Floating Shapes */
      .shape {
        position: absolute;
        filter: blur(50px);
        z-index: -1;
        animation: float 20s infinite;
        opacity: 0.6;
      }
      .shape-1 {
        top: -10%;
        left: -10%;
        width: 500px;
        height: 500px;
        background: #4f46e5;
        animation-delay: 0s;
      }
      .shape-2 {
        bottom: -10%;
        right: -10%;
        width: 400px;
        height: 400px;
        background: #ec4899;
        animation-delay: -5s;
      }
      .shape-3 {
        top: 40%;
        left: 40%;
        width: 300px;
        height: 300px;
        background: #06b6d4;
        animation-delay: -10s;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        33% {
          transform: translate(30px, -50px) rotate(10deg);
        }
        66% {
          transform: translate(-20px, 20px) rotate(-5deg);
        }
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
      }

      /* Glassmorphism Card */
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      /* Input Autofill Fix */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus,
      input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
        -webkit-text-fill-color: white !important;
        transition: background-color 5000s ease-in-out 0s;
      }

      /* Custom Checkbox */
      .custom-checkbox:checked {
        background-color: #6366f1;
        border-color: #6366f1;
      }

      /* Shake Animation for Errors */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        10%,
        30%,
        50%,
        70%,
        90% {
          transform: translateX(-5px);
        }
        20%,
        40%,
        60%,
        80% {
          transform: translateX(5px);
        }
      }
      .shake {
        animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }

      /* Loading Spinner */
      .spinner {
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 3px solid #ffffff;
        width: 20px;
        height: 20px;
        -webkit-animation: spin 1s linear infinite; /* Safari */
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Success Checkmark */
      .checkmark__circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 2;
        stroke-miterlimit: 10;
        stroke: #4bb71b;
        fill: none;
        animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }
      .checkmark {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: block;
        stroke-width: 2;
        stroke: #fff;
        stroke-miterlimit: 10;
        margin: 10% auto;
        box-shadow: inset 0px 0px 0px #4bb71b;
        animation:
          fill 0.4s ease-in-out 0.4s forwards,
          scale 0.3s ease-in-out 0.9s both;
      }
      .checkmark__check {
        transform-origin: 50% 50%;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
      }
      @keyframes stroke {
        100% {
          stroke-dashoffset: 0;
        }
      }
      @keyframes scale {
        0%,
        100% {
          transform: none;
        }
        50% {
          transform: scale3d(1.1, 1.1, 1);
        }
      }
      @keyframes fill {
        100% {
          box-shadow: inset 0px 0px 0px 30px #4bb71b;
        }
      }
    </style>
  </head>
  <body
    class="h-screen w-full flex items-center justify-center relative text-white"
  >
    <!-- Background Elements -->
    <div class="bg-gradient-animate"></div>
    <div class="shape shape-1 rounded-full"></div>
    <div class="shape shape-2 rounded-full"></div>
    <div class="shape shape-3 rounded-full"></div>

    <!-- Main Container -->
    <div class="w-full max-w-md p-6 relative z-10">
      <!-- Login Card -->
      <div
        id="loginCard"
        class="glass-card rounded-2xl p-8 w-full transform transition-all duration-500"
      >
        <!-- Header -->
        <div class="text-center mb-8">
          <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/20 mb-4 ring-1 ring-indigo-400/30"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-8 w-8 text-indigo-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              />
            </svg>
          </div>
          <h2 class="text-3xl font-bold tracking-tight text-white">
            Admin Access
          </h2>
          <p class="text-slate-400 mt-2 text-sm">
            Enter your credentials to access the dashboard.
          </p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-6" novalidate>
          <!-- Email Input -->
          <div class="group relative">
            <label
              for="email"
              class="block text-sm font-medium text-slate-300 mb-1 ml-1"
              >Email Address</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <svg
                  class="h-5 w-5 text-slate-500 group-focus-within:text-indigo-400 transition-colors"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"
                  />
                  <path
                    d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"
                  />
                </svg>
              </div>
              <input
                type="email"
                id="email"
                name="email"
                class="block w-full pl-10 pr-3 py-3 border border-slate-600 rounded-lg leading-5 bg-slate-800/50 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all duration-200"
                placeholder="admin@example.com"
              />
            </div>
            <p id="emailError" class="mt-1 text-xs text-red-400 hidden">
              Please enter a valid email address.
            </p>
          </div>

          <!-- Password Input -->
          <div class="group relative">
            <label
              for="password"
              class="block text-sm font-medium text-slate-300 mb-1 ml-1"
              >Password</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <svg
                  class="h-5 w-5 text-slate-500 group-focus-within:text-indigo-400 transition-colors"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                    clip-rule="evenodd"
                  />
                </svg>
              </div>
              <input
                type="password"
                id="password"
                name="password"
                class="block w-full pl-10 pr-10 py-3 border border-slate-600 rounded-lg leading-5 bg-slate-800/50 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all duration-200"
                placeholder="••••••••"
              />
              <div
                class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer"
                id="togglePassword"
              >
                <svg
                  id="eyeIcon"
                  class="h-5 w-5 text-slate-500 hover:text-slate-300 transition-colors"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                  <path
                    fill-rule="evenodd"
                    d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                    clip-rule="evenodd"
                  />
                </svg>
                <svg
                  id="eyeOffIcon"
                  class="h-5 w-5 text-slate-500 hover:text-slate-300 transition-colors hidden"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z"
                    clip-rule="evenodd"
                  />
                  <path
                    d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"
                  />
                </svg>
              </div>
            </div>
            <p id="passwordError" class="mt-1 text-xs text-red-400 hidden">
              Password must be at least 6 characters.
            </p>
          </div>

          <!-- Options -->
          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input
                id="remember-me"
                name="remember-me"
                type="checkbox"
                class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-600 rounded bg-slate-800/50 custom-checkbox cursor-pointer"
              />
              <label
                for="remember-me"
                class="ml-2 block text-sm text-slate-400 cursor-pointer select-none"
                >Remember me</label
              >
            </div>
            <div class="text-sm">
              <a
                href="#"
                class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors"
                >Forgot password?</a
              >
            </div>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            id="submitBtn"
            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-slate-900 transition-all duration-200 shadow-lg shadow-indigo-500/30 overflow-hidden"
          >
            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
              <svg
                class="h-5 w-5 text-indigo-400 group-hover:text-indigo-300 transition-colors"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 20 20"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  fill-rule="evenodd"
                  d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                  clip-rule="evenodd"
                />
              </svg>
            </span>
            <span id="btnText">Sign in</span>
            <div id="btnLoader" class="spinner hidden"></div>
          </button>
        </form>

        <!-- Footer -->
        <div class="mt-6 text-center">
          <p class="text-xs text-slate-500">
            Secure connection established.
            <span class="text-emerald-400">TLS 1.3</span>
          </p>
        </div>
      </div>

      <!-- Success State (Hidden initially) -->
      <div
        id="successCard"
        class="glass-card rounded-2xl p-8 w-full hidden text-center transform transition-all duration-500 scale-95 opacity-0"
      >
        <div class="checkmark-wrapper">
          <svg
            class="checkmark"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 52 52"
          >
            <circle
              class="checkmark__circle"
              cx="26"
              cy="26"
              r="25"
              fill="none"
            />
            <path
              class="checkmark__check"
              fill="none"
              d="M14.1 27.2l7.1 7.2 16.7-16.8"
            />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-white mt-4">Access Granted</h2>
        <p class="text-slate-400 mt-2">Redirecting to dashboard...</p>
        <div class="mt-6 w-full bg-slate-700 rounded-full h-1.5">
          <div
            class="bg-emerald-500 h-1.5 rounded-full animate-pulse"
            style="width: 100%"
          ></div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const loginForm = document.getElementById("loginForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");
        const eyeIcon = document.getElementById("eyeIcon");
        const eyeOffIcon = document.getElementById("eyeOffIcon");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const btnLoader = document.getElementById("btnLoader");
        const loginCard = document.getElementById("loginCard");
        const successCard = document.getElementById("successCard");

        // Toggle Password Visibility
        togglePassword.addEventListener("click", () => {
          const type =
            passwordInput.getAttribute("type") === "password"
              ? "text"
              : "password";
          passwordInput.setAttribute("type", type);

          if (type === "text") {
            eyeIcon.classList.add("hidden");
            eyeOffIcon.classList.remove("hidden");
          } else {
            eyeIcon.classList.remove("hidden");
            eyeOffIcon.classList.add("hidden");
          }
        });

        // Validation Functions
        const validateEmail = (email) => {
          return String(email)
            .toLowerCase()
            .match(
              /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/,
            );
        };

        const showError = (input, msgElement) => {
          input.classList.add(
            "border-red-500",
            "focus:ring-red-500",
            "focus:border-red-500",
          );
          input.classList.remove(
            "border-slate-600",
            "focus:ring-indigo-500",
            "focus:border-indigo-500",
          );
          msgElement.classList.remove("hidden");

          // Add shake effect to parent
          input.closest(".group").classList.add("shake");
          setTimeout(() => {
            input.closest(".group").classList.remove("shake");
          }, 500);
        };

        const clearError = (input, msgElement) => {
          input.classList.remove(
            "border-red-500",
            "focus:ring-red-500",
            "focus:border-red-500",
          );
          input.classList.add(
            "border-slate-600",
            "focus:ring-indigo-500",
            "focus:border-indigo-500",
          );
          msgElement.classList.add("hidden");
        };

        // Real-time validation
        emailInput.addEventListener("input", () => {
          if (emailInput.value.length > 0 && !validateEmail(emailInput.value)) {
            // Don't show error immediately while typing, just remove success styles if any
          } else {
            clearError(emailInput, document.getElementById("emailError"));
          }
        });

        passwordInput.addEventListener("input", () => {
          if (passwordInput.value.length >= 6) {
            clearError(passwordInput, document.getElementById("passwordError"));
          }
        });

        // Form Submission
        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          let isValid = true;

          // Validate Email
          if (!validateEmail(emailInput.value)) {
            showError(emailInput, document.getElementById("emailError"));
            isValid = false;
          } else {
            clearError(emailInput, document.getElementById("emailError"));
          }

          // Validate Password
          if (passwordInput.value.length < 6) {
            showError(passwordInput, document.getElementById("passwordError"));
            isValid = false;
          } else {
            clearError(passwordInput, document.getElementById("passwordError"));
          }

          if (!isValid) return;

          // Simulate API Call
          setLoading(true);

          // Simulate network delay
          await new Promise((resolve) => setTimeout(resolve, 2000));

          // Mock Authentication Check
          // In a real app, this would check against a backend
          // For demo purposes, let's accept any valid format email/password
          // But let's add a fun "easter egg" for a specific credential to show failure
          if (emailInput.value === "fail@example.com") {
            setLoading(false);
            showError(emailInput, document.getElementById("emailError"));
            document.getElementById("emailError").innerText =
              "Invalid credentials provided.";
            document.getElementById("emailError").classList.remove("hidden");
            return;
          }

          // Success
          showSuccess();
        });

        function setLoading(isLoading) {
          if (isLoading) {
            submitBtn.disabled = true;
            submitBtn.classList.add("cursor-not-allowed", "opacity-80");
            btnText.classList.add("hidden");
            btnLoader.classList.remove("hidden");
          } else {
            submitBtn.disabled = false;
            submitBtn.classList.remove("cursor-not-allowed", "opacity-80");
            btnText.classList.remove("hidden");
            btnLoader.classList.add("hidden");
          }
        }

        function showSuccess() {
          // Fade out login card
          loginCard.style.opacity = "0";
          loginCard.style.transform = "scale(0.95)";

          setTimeout(() => {
            loginCard.classList.add("hidden");
            successCard.classList.remove("hidden");

            // Trigger reflow
            void successCard.offsetWidth;

            // Fade in success card
            successCard.classList.remove("scale-95", "opacity-0");
            successCard.classList.add("scale-100", "opacity-100");
          }, 500);

          // Simulate redirect
          setTimeout(() => {
            // In a real app: window.location.href = '/dashboard';
            // For demo, we just log or could reset
            console.log("Redirecting...");
          }, 3000);
        }
      });
    </script>
  </body>
</html>
