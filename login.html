<!-- login.html - Unified Login for All Users -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#D11243" />
    <title>Login - FreshCart</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --primary: #d11243;
        --primary-dark: #9e0b32;
        --primary-light: #fff0f3;
        --dark: #1a1a1a;
        --gray: #666;
        --light-gray: #f5f5f5;
        --border: #e0e0e0;
        --white: #ffffff;
        --success: #4caf50;
        --warning: #ff9800;
        --error: #f44336;
        --info: #2196f3;
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header-section {
        padding: 50px 24px 30px;
        text-align: center;
        color: white;
      }

      .logo {
        width: 90px;
        height: 90px;
        background: white;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 48px;
        color: var(--primary);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .brand-name {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }

      .tagline {
        font-size: 15px;
        opacity: 0.9;
      }

      .login-container {
        flex: 1;
        background: white;
        border-radius: 30px 30px 0 0;
        padding: 32px 24px;
        animation: slideUp 0.5s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .form-title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--dark);
      }

      .form-subtitle {
        font-size: 14px;
        color: var(--gray);
        margin-bottom: 28px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--gray);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .input-wrapper {
        position: relative;
      }

      .input-field {
        width: 100%;
        padding: 16px 16px 16px 50px;
        border: 2px solid var(--border);
        border-radius: 14px;
        font-size: 16px;
        transition: all 0.3s;
        font-family: inherit;
      }

      .input-field:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-light);
      }

      .input-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray);
        font-size: 18px;
        transition: color 0.3s;
      }

      .input-field:focus + .input-icon {
        color: var(--primary);
      }

      .password-toggle {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--gray);
        cursor: pointer;
        font-size: 18px;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .error-message {
        background: #ffebee;
        color: var(--error);
        padding: 14px 16px;
        border-radius: 12px;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
        align-items: center;
        gap: 10px;
        animation: shake 0.4s ease;
      }

      .error-message.show {
        display: flex;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      .options-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        font-size: 14px;
        color: var(--gray);
      }

      .remember-me input {
        width: 20px;
        height: 20px;
        accent-color: var(--primary);
      }

      .forgot-link {
        font-size: 14px;
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
      }

      .login-btn {
        width: 100%;
        padding: 18px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(209, 18, 67, 0.3);
      }

      .login-btn:active {
        transform: scale(0.98);
      }

      .login-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        box-shadow: none;
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 28px 0;
        color: var(--gray);
        font-size: 14px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .divider span {
        padding: 0 16px;
      }

      .social-login {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }

      .social-btn {
        flex: 1;
        padding: 14px;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .social-btn.google {
        color: #db4437;
      }

      .social-btn.phone {
        color: var(--success);
      }

      .signup-link {
        text-align: center;
        font-size: 15px;
        color: var(--gray);
      }

      .signup-link a {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
      }

      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.95);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
      }

      .loading-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid var(--light-gray);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        margin-top: 16px;
        font-size: 16px;
        font-weight: 600;
        color: var(--gray);
      }

      .toast {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--dark);
        color: white;
        padding: 14px 28px;
        border-radius: 25px;
        font-size: 14px;
        font-weight: 600;
        z-index: 3000;
        opacity: 0;
        transition: all 0.3s;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      @media (min-width: 480px) {
        body {
          background: var(--light-gray);
          align-items: center;
          justify-content: center;
          padding: 20px;
        }

        .header-section {
          background: transparent;
          max-width: 420px;
        }

        .login-container {
          border-radius: 24px;
          max-width: 420px;
          box-shadow: var(--shadow);
        }
      }
    </style>
  </head>
  <body>
    <div class="header-section">
      <div class="logo">
        <i class="fas fa-drumstick-bite"></i>
      </div>
      <h1 class="brand-name">FreshCart</h1>
      <p class="tagline">Premium Meat & Seafood Delivery</p>
    </div>

    <div class="login-container">
      <h2 class="form-title">Welcome Back!</h2>
      <p class="form-subtitle">Login to access your account</p>

      <div class="error-message" id="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">Invalid credentials</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label class="input-label">Email / Mobile / Staff ID</label>
          <div class="input-wrapper">
            <input
              type="text"
              class="input-field"
              id="loginInput"
              placeholder="Enter your credentials"
              required
            />
            <i class="fas fa-user input-icon"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              class="input-field"
              id="passwordInput"
              placeholder="Enter your password"
              required
            />
            <i class="fas fa-lock input-icon"></i>
            <button
              type="button"
              class="password-toggle"
              onclick="togglePassword()"
            >
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" onclick="forgotPassword()"
            >Forgot Password?</a
          >
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span>Login</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="social-login">
        <button class="social-btn google" onclick="socialLogin('google')">
          <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn phone" onclick="phoneLogin()">
          <i class="fas fa-mobile-alt"></i> Phone
        </button>
      </div>

      <p class="signup-link">
        Don't have an account? <a href="register.html">Sign Up</a>
      </p>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">Authenticating...</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // Unified Login Handler
      async function handleLogin(e) {
        e.preventDefault();

        const loginId = document.getElementById("loginInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const rememberMe = document.getElementById("rememberMe").checked;

        if (!loginId || !password) {
          showError("Please enter both login ID and password");
          return;
        }

        showLoading(true);
        hideError();

        try {
          // Call Django API
          const response = await fetch("/api/auth/login/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              login_id: loginId,
              password: password,
            }),
          });

          const data = await response.json();

          if (data.success) {
            // Store auth data
            localStorage.setItem("authToken", data.token);
            localStorage.setItem("refreshToken", data.refresh);
            localStorage.setItem("userRole", data.role);
            localStorage.setItem("userData", JSON.stringify(data.user));
            localStorage.setItem(
              "userPermissions",
              JSON.stringify(data.permissions),
            );

            if (rememberMe) {
              localStorage.setItem("rememberedUser", loginId);
            }

            showToast(`Welcome back, ${data.user.name}!`, "success");

            // Redirect to unified dashboard
            setTimeout(() => {
              window.location.href = "dashboard.html";
            }, 500);
          } else {
            showError(data.message || "Invalid credentials");
            showLoading(false);
          }
        } catch (error) {
          // Demo mode fallback
          console.log("API not available, using demo mode");
          handleDemoLogin(loginId, password);
        }
      }

      // Demo Login (Remove in production)
      function handleDemoLogin(loginId, password) {
        setTimeout(() => {
          const demoUsers = {
            "customer@freshcart.com": {
              role: "customer",
              name: "Rahul Sharma",
            },
            "staff@freshcart.com": { role: "staff", name: "Staff Member" },
            "admin@freshcart.com": { role: "admin", name: "Admin User" },
            "delivery@freshcart.com": {
              role: "delivery",
              name: "Delivery Partner",
            },
          };

          const user = demoUsers[loginId];

          if (user && password === "password123") {
            const mockData = {
              success: true,
              token: "demo_jwt_" + Date.now(),
              refresh: "demo_refresh_" + Date.now(),
              role: user.role,
              user: {
                id: user.role + "_001",
                name: user.name,
                email: loginId,
                avatar:
                  "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop",
                phone: "+91 98765 43210",
              },
              permissions: getRolePermissions(user.role),
            };

            // Store data
            Object.keys(mockData).forEach((key) => {
              if (key !== "success") {
                localStorage.setItem(
                  key === "user" || key === "permissions" ? key : key,
                  typeof mockData[key] === "object"
                    ? JSON.stringify(mockData[key])
                    : mockData[key],
                );
              }
            });

            showToast(`Welcome ${user.name}! (${user.role})`, "success");
            setTimeout(() => (window.location.href = "dashboard.html"), 800);
          } else {
            showError(
              "Invalid credentials. Try: customer@freshcart.com / password123",
            );
            showLoading(false);
          }
        }, 1500);
      }

      function getRolePermissions(role) {
        const permissions = {
          customer: [
            "view_products",
            "place_orders",
            "view_history",
            "manage_profile",
          ],
          staff: [
            "view_products",
            "place_orders",
            "view_history",
            "manage_profile",
            "staff_checkout",
            "bulk_orders",
            "customer_management",
            "view_reports",
          ],
          admin: [
            "all_permissions",
            "user_management",
            "inventory_management",
            "financial_reports",
            "system_settings",
            "staff_management",
          ],
          delivery: [
            "view_assigned_orders",
            "update_delivery_status",
            "view_route",
            "customer_contact",
            "delivery_history",
          ],
        };
        return permissions[role] || [];
      }

      // UI Functions
      function togglePassword() {
        const input = document.getElementById("passwordInput");
        const icon = document.getElementById("eyeIcon");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }

      function showLoading(show) {
        document
          .getElementById("loadingOverlay")
          .classList.toggle("active", show);
        document.getElementById("loginBtn").disabled = show;
      }

      function showError(message) {
        const errorEl = document.getElementById("errorMessage");
        document.getElementById("errorText").textContent = message;
        errorEl.classList.add("show");
      }

      function hideError() {
        document.getElementById("errorMessage").classList.remove("show");
      }

      function showToast(message, type = "info") {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast show " + type;
        setTimeout(() => toast.classList.remove("show"), 3000);
      }

      function forgotPassword() {
        const loginId = document.getElementById("loginInput").value;
        if (!loginId) {
          showError("Please enter your email or mobile first");
          return;
        }
        showToast("Password reset link sent to " + loginId);
      }

      function socialLogin(provider) {
        showToast("Connecting to " + provider + "...");
      }

      function phoneLogin() {
        showToast("Phone OTP login - Enter mobile number");
      }

      // Check for remembered user
      document.addEventListener("DOMContentLoaded", () => {
        const remembered = localStorage.getItem("rememberedUser");
        if (remembered) {
          document.getElementById("loginInput").value = remembered;
          document.getElementById("rememberMe").checked = true;
        }
      });
    </script>
  </body>
</html>
